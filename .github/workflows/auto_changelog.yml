# Creates an entry in html/changelogs automatically, to eventually be compiled by compile_changelogs
name: Auto Changelog
on:
  pull_request_target:
    types:
      - closed
    branches:
      - master
permissions:
  contents: write
jobs:
  auto_changelog:
    runs-on: ubuntu-24.04
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate App Token
        id: app-token-generation
        uses: actions/create-github-app-token@v3.2.0
        if: env.APP_PRIVATE_KEY != '' && env.APP_ID != ''
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          APP_ID: ${{ secrets.APP_ID }}

      - name: Run auto changelog
        uses: actions/github-script@v9
        with:
          script: |
            const { processAutoChangelog } = await import('${{ github.workspace }}/tools/pull_request_hooks/autoChangelog.js')
            await processAutoChangelog({ github, context })
          github-token: ${{ steps.app-token-generation.outputs.token || secrets.GITHUB_TOKEN }}
      # NEMESIS EDIT ADDITION START
      - name: "Check for CHANGELOG_DISCORD_WEBHOOK secret"
        id: check_changelog_discord_webhook
        env:
          CHANGELOG_DISCORD_WEBHOOK: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
        run: |
          unset SECRET_EXISTS
          if [ -n "$CHANGELOG_DISCORD_WEBHOOK" ]; then SECRET_EXISTS=true ; fi
          echo "DISCORD_ENABLED=$SECRET_EXISTS" >> $GITHUB_OUTPUT
      - name: Send Discord notification
        if: steps.check_changelog_discord_webhook.outputs.DISCORD_ENABLED == 'true'
        env:
          CHANGELOG_DISCORD_WEBHOOK: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
        uses: actions/github-script@v9
        with:
          script: |
            const { sendDiscordChangelog } = await import('${{ github.workspace }}/tools/pull_request_hooks/discordChangelog.js')
            await sendDiscordChangelog({ context })
      # NEMESIS EDIT ADDITION END
