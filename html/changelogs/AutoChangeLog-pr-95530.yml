author: "ArcaneMusic"
delete-after: True
changes:
  - rscadd: "The boulder smelter and refinery may now take a plumbing input (Closely examine to see the full list) to boost the mineral output of processed boulders."
  - rscadd: "Boulder refinery machines will produce a new chemical, industrial waste, which must be managed, dispersed, or it will eventually overflow if too much exists in the same container."
  - balance: "The smelter and refinery now produce less mining points per unit than before, but the quantity of points are now better scaled to the quantity processed. 50% more ores means 50% more points."
  - balance: "The amount of points generated per ore within boulders is now a separate variable, not a percentage of the base value. This means some ores are better/worse for generating mining points as a result."
  - balance: "Completing wave defense will award 200 more points across all ore vent tiers, 700/1200/1700 for small/medium/large vents."