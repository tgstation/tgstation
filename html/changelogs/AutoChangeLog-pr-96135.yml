author: "ArcaneMusic"
delete-after: True
changes:
  - balance: "Non-boss ore vents may no longer contain bluespace crystals and diamonds."
  - balance: "All ore vents now have a flat 7% chance to spawn an artifact boulder."
  - balance: "There are now 2 new artifact boulder types, which may contain 1-5 sheets worth of bluespace crystals or diamonds respectively. These boulders may have their rare ore boosted via chemical boosting."
  - balance: "ore distribution in vents have been adjusted to accommodate for bluespace and diamonds being removed from vents accordingly."
  - spellcheck: " Ore vents now explain the artifact boulder mechanic on examine."