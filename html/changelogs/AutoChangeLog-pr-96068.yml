author: "EnterTheJake"
delete-after: True
changes:
  - rscadd: "Tactical Maps have been added to the game!"
  - rscadd: "Nuclear Operatives implants now grant the ability to open a Minimap, this map will display and show the names of various areas of the station, and the positioning of the Nukeops team,borgs,mechs,Cayenne and the nuke disk in real time!"
  - rscadd: "Nukie leaders and OW agents can also draw and apply labels to the map."
  - rscadd: "the \"Recoinassance Platform\" has been added to the Nukie Base, it allows displaying of the Tactical maps while on the Syndicate Base Z level."
  - map: "The briefing room in the NukeOps base has been remapped to better accomodate the new Holographic table."
  - map: "Changed the front shutters on the Syndicate Infiltrator to the more fitting Syndicate Shutters."