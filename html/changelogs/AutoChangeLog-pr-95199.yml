author: "Melbert"
delete-after: True
changes:
  - rscdel: "Removed ember particle effects from mob fire"
  - rscadd: "Mob fire brightness now scales with how \"on fire\" it is - the more fire, the brighter the light"
  - rscadd: "Mob fire now has a bloom effect and glows a bit"
  - rscadd: "The threshold that human fire sprites update from \"small\" to \"big\" has been increased (by 10%)"
  - bugfix: "Fixed broken frame in monkey fire animation"
  - bugfix: "All Xenomorphs now use the generic fire sprite"
  - bugfix: "All Xenomorphs no longer lose their fire sprites when resting"
  - bugfix: "Large Xenomorphs now offset their fire overlay to the middle of their sprite"