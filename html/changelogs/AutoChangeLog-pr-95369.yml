author: "Iamgoofball"
delete-after: True
changes:
  - rscadd: "Added support for Radio TTS. You will now hear players over the radio via the TTS system."
  - rscadd: "Configure this in Game Options under the Sound tab."
  - sound: "Re-did blips to be significantly nicer sounding and way better."
  - sound: "Alien speech you don't understand now comes through as Blips. If you have TTS entirely disabled, you won't hear blips."
  - sound: "The Tram and Computers now utilize the TTS system. Configs have been added to set a consistent voice."
  - sound: "TTS audio now utilizes 3D audio; you can now walk away from people saying stupid shit and it gets quieter."
  - sound: "Blips also now include more customization options, and a dedicated Blips preview button by clicking the leaf icon."
  - rscdel: "The configuration to disable TTS on whispering has been removed, as it is no longer needed and also interferes with radio TTS functioning properly."