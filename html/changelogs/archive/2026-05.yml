2026-05-01:
  TheRyeGuyWhoWillNowDie:
  - qol: hyposprays can now draw from other reagent containers
2026-05-02:
  Hatterhat:
  - qol: The style meter for miners now stores its permanent multiplier on the meter
      in case you're switching eyewear. The style meter item is now small, allowing
      for easier storage.
  lelandkemble:
  - bugfix: Mjolnir only successfully attacks if it successfully attacks
  necromanceranne:
  - bugfix: Void cloaks no longer obstruct surgery while invisible.
2026-05-03:
  Aliceee2ch:
  - bugfix: Fixed color matrix not applying in reskinnable item preview.
  Melbert:
  - bugfix: Fix some erroneous dream portents from showing up
  lelandkemble:
  - code_imp: Things that interrupted the opening of storages are no longer reliant
      on a runtime, meaning they interrupt regardless of whether you had another open
      storage open at the time
  - balance: Blood from blood bags is fully synthetic
  vinylspiders:
  - code_imp: fixes mining mobs being able to spawn too close to one another under
      certain circumstances
2026-05-04:
  SmArtKar:
  - admin: Added a new debug tool which displays a detailed breakdown of in-game visuals
2026-05-05:
  Absolucy:
  - qol: Changed how chat highlights are styled - any color should look good now,
      regardless of light or dark mode.
  LT3:
  - balance: Cargo manifest stamp payments/penalties are now consistently applied
      as a percentage of the order value
  - balance: Maximum payment for an approved cargo manifest raised to 120cr
  - balance: Cargo orders that arrive empty and stamped denied receive a full refund
      regardless of crate return
  Melbert:
  - refactor: Refactored hair and eye rendering a bit, they're now rendered separately
      to the head - report any oddities with either. Lips too but to a lesser degree.
  - rscadd: Adds Penguin tier zero gene infusion (gives you penguin ears, which make
      you waddle)
  - rscadd: Adds Plant tier zero gene infusion (gives you plant hair / organs, which
      do nothing)
  - rscadd: Adds Stoat tier one gene infusion (makes you tall, snouted, gives you
      finer instincts, allows you to dodge large foes)
  - rscadd: April 26th is Chernobyl Disaster Remembrance Day.
  Time-Green:
  - rscadd: Adds three new maintpill-only chems! Go eat more maintpills, and maybe
      you'll find out what they are :)
  - rscadd: Adds a new secret chem, which can rarely be found on a petrified piece
      of paper somewhere in maintenance...
  - bugfix: Fixes miscellaneous sources of petrification lasting 10x as long as intended
  Y0SH1M4S73R:
  - rscadd: Ghosts and spirits have once again been split into two species. Becoming
      a ghost is only possible through a lucky polymorph, or the "Forsake Body" spell,
      available for two points in a wizard's spellbook.
  - rscdel: Spirits no longer have the passthrough ability.
  - balance: Ghost's passthrough ability has unlimited range and no longer leaves
      behind a grave. It is affected by holy water, and makes you drop all your equipment,
      along with any bodyparts and organs that are not ghostly in nature.
  lelandkemble:
  - bugfix: You can now get the paddles from a compact defib by clicking on it
  strandsofivy:
  - bugfix: The PDA direct messenger will no longer overzealously break words, resulting
      in cleaner chat message formatting overall.
  vinylspiders:
  - admin: invisimin now makes the admin invisible to ghosts/observers, as well as
      pierce-immune and able to phase through walls
  - qol: aghosting while invisimin'd or stealthmin'd will carry over your invisibility
      to the aghost so you no longer have to trigger it again
  - admin: added a new admin verb, 'Toggle Admin ESP', which lets you see ghosts and
      invisimins while active
2026-05-06:
  Absolucy, vinylspiders, neocloudy:
  - rscadd: Added a pair of signboards that can be crafted in the crafting menu, a
      wooden one, and a holographic one. Perfect for advertising or otherwise getting
      your VERY important message across to passersby.
  Hatterhat:
  - admin: Admins can now varedit blob overminds (the eye mob) to not kill everyone
      on the station if they hit critical mass. (Admins will still have to remove
      the blob from the shuttle subsystem's "hostile environments" tracker, though.)
  lelandkemble:
  - bugfix: animating a wand of animation works, and that animated wand of animation
      animating a wand of animation does not runtime
  vinylspiders:
  - code_imp: speeds ghost runechat up a bit, and makes it show as italic
  - admin: adds a 'toggle dead runechat' admin verb in case you need to disable it
      midround for an event or something
2026-05-07:
  ArcaneMusic:
  - rscadd: Adds the E-2 Earthcracker device as a purchasable traitor item for 2 TC.
      Use it to create potentially devastating weakpoints onto the station!
  Higgin:
  - bugfix: positive viruses no longer self-cure when not having spaceacillin or meeting
      the nutrition/satiety requirements.
  Shroopy:
  - bugfix: Fixed syndicate bombs having a maximum timer of 1000 minutes instead of
      100 minutes.
