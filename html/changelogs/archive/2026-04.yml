2026-04-03:
  Absolucy:
  - bugfix: Ascended Void heretics now properly play the deflect sound when deflecting
      projectiles.
  - admin: View Variables can now properly view alists, altho it cannot edit them.
  ArcaneMusic:
  - qol: The pneumatic cannon's examine will now show the contents of the cannon loaded.
  - bugfix: You may now place a pneumatic cannon (and the clown's pie cannon!) onto
      tables.
  Hatterhat:
  - balance: Upgraded hydroponics trays now have reduced power draw with improved
      parts, in the wake of complaints from both engineering and botanical staff regarding
      exponentially increased short circuit frequency (and associated energy waste)
      in affected tray basins.
  JohnFulpWillard:
  - bugfix: The Combat indicator will now properly move back to its original location
      when using F12.
  - bugfix: Sleep icon now appears again & rest icon now respects "Toggle Hotkeys
      button" mode.
  Melbert:
  - bugfix: Fixes wizard, cult, nukies, revs, and malf being unable to be selected
      for roundstart antag (yes, you read that right)
  - rscadd: Walking in snow or sand leaves behind prints. You can examine the turf
      to see what left the prints, like with bloodprints.
  - rscadd: Snowstorms or sandstorms clear away any footprints left behind in the
      snow or sand.
  - rscadd: Some equipment or effects, like skis or snowshoes, prevent you from leaving
      prints in the snow.
  - rscadd: You can fill in snowprints with snow.
  - rscdel: Zero-gravity drifting is no longer affected by inertia, ie it has been
      reverted to what it once was.
  SmArtKar:
  - qol: Non-aliens with an implanted plasma vessel now see their plasma level in
      their HUD instead of just the stat panel
  - refactor: Refactored the entirety of HUD management code, report if anything breaks!
  - bugfix: FOV blockers no longer harddel
  lelandkemble:
  - bugfix: Wheelys dont turn you when you kick them out
  - bugfix: Three cult abilities no longer runtime
  - bugfix: HUDs are now visible when looking up a floor, as well as by AIS and camera
      consoles on lower floors.
  timothymtorres:
  - rscadd: To help cover budget expenses, NT has redesigned and installed new slot
      machines that are themed by department. Slot machines can also be linked to
      bank accounts via ID cards or department budget cards. NT takes a 40% cut of
      profit to payout major jackpots and bonus spins. Please gamble responsibly.
  - map: Replaced all slot machines with slot machine random spawners. Added syndicate
      slot machines to Syndicate bases and nuke outposts.
2026-04-04:
  Melbert:
  - qol: Recovered crew/Thanatorenasia bodies in morgue trays change the indicator
      to green when a ghost is orbiting them (to allow ghosts to signal they want
      it to be revived)
  - qol: Recovered crew/Thanatorenasia bodies now cause morgue trays / bodybags to
      shake when orbited, much like how the body itself shakes when orbited (to allow
      ghosts to signal they want it to be revived)
  - qol: '"Egg" foodtype now exists for better food sorting, though no species in
