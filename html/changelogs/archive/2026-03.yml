  ttt, JohnFulpWillard:
  - rscadd: Added a Memory HUD to your UI. In case you didn't know, you get memories
      of things happening around the station, or important antagonist info such as
      the nuclear codes.
  - rscdel: Removed Borg's "store" button, now the cyborg module will behave more
