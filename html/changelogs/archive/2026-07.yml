2026-07-01:
  ArcaneMusic:
  - rscadd: Cargo may now purchase jet boots, boots that enable sustained flight,
      for 40,000 credits via the imports section.
  CabinetOnFire:
  - bugfix: Fixes crates not respecting density in all cases and being able to move
      into other crates or tables
  Ghommie:
  - rscadd: The kitchen fridges may have additional ingredients on certain holidays,
      in particular Atrakor's Might (lizardpeople) and Fleet Day (mothpeople), and
      Vegan Day.
  - rscadd: Added a few more holyday-specific mail items.
  - rscadd: Replaces the beer keg in the bar backroom with special kegs on St. Patrick's
      Day, Beer Day and Speak-Like-a-Pirate day. On any other day, there's a chance
      that the beer keg will be replaced with one containing whiskey or rum, or in
      rare cases, one of those special kegs.
  Jacquerel:
  - rscadd: Mobs on Lavaland will repopulate during ash storms.
  LT3:
  - bugfix: Fixed jaws of recovery not being able to be stored in the paramedic EMT
      belt
  Melbert:
  - bugfix: Fix emote overlays sticking
  - balance: Mutation toxins now work on plasmamen, skeletons, zombies, spirits, and
      vampires
  QuiteLiterallyAnything:
  - bugfix: Night shift lighting can be manually enabled through APCs again.
  - bugfix: Night lighting is no longer automatically reenabled during red alert night
      shifts when APCs are drained and recharged.
  Singul0:
  - code_imp: Swaps out parrot's sovlful unique item carrying ability with a soulless
      hand (singular)
  - bugfix: Fixes specific hands hotkey breaking hands on singlehanded mobs
  Yobrocharlie:
  - rscdel: Removed both mounted guns in the heretic gateway per headmin request
  vinylspiders:
  - code_imp: bodyshape is now accessible in build_worn_overlays() and similar procs.
  - image: lizards now have support female gender shaping for their suits
